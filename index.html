<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 블랙박스</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

/* 헤더 */
.header { background: #0C447C; padding: 16px 20px 12px; }
.header-title { font-size: 18px; font-weight: 600; color: #E6F1FB; }
.header-sub { font-size: 12px; color: #85B7EB; margin-top: 2px; }

/* 상단 탭 (메인 네비) */
.top-nav { display: flex; background: #111118; border-bottom: 1px solid #1e1e2e; }
.top-nav-item { flex: 1; padding: 10px 0; text-align: center; font-size: 12px; color: #666; cursor: pointer; border-bottom: 2px solid transparent; }
.top-nav-item.active { color: #378ADD; border-bottom-color: #378ADD; font-weight: 500; }

/* 콘텐츠 */
.content { flex: 1; overflow-y: auto; }
.page { display: none; flex-direction: column; }
.page.active { display: flex; }

/* 코인 목록 */
.coin-list-wrap { padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.market-summary { background: #13131f; border: 1px solid #1e1e2e; border-radius: 12px; padding: 12px 14px; margin-bottom: 4px; }
.market-summary-title { font-size: 11px; color: #666; margin-bottom: 6px; }
.market-summary-row { display: flex; justify-content: space-between; align-items: center; }
.market-summary-label { font-size: 13px; color: #fff; font-weight: 500; }
.market-summary-sub { font-size: 11px; color: #666; margin-top: 2px; }
.coin-card { background: #13131f; border: 1px solid #1e1e2e; border-radius: 14px; padding: 14px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.2s; }
.coin-card:hover { border-color: #185FA5; }
.coin-left { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.coin-name { font-size: 15px; font-weight: 600; color: #fff; }
.coin-desc { font-size: 11px; color: #666; line-height: 1.4; }
.coin-right { text-align: right; flex-shrink: 0; margin-left: 12px; }
.coin-price { font-size: 15px; font-weight: 600; color: #fff; }
.coin-change { font-size: 11px; margin-top: 2px; }
.up { color: #e74c3c; }
.down { color: #3498db; }
.neutral { color: #666; }
.warn { color: #f39c12; }
.green { color: #2ecc71; }

/* 코인 상세 - 상단 고정 영역 */
.coin-detail-header { background: #13131f; border-bottom: 1px solid #1e1e2e; padding: 14px 16px 0; }
.back-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #378ADD; cursor: pointer; background: none; border: none; padding: 0 0 10px; }
.detail-coin-name { font-size: 13px; color: #888; }
.detail-price-row { display: flex; align-items: baseline; gap: 10px; margin: 4px 0 2px; }
.detail-price { font-size: 28px; font-weight: 700; color: #fff; transition: color 0.5s ease; }
.detail-change { font-size: 14px; }
.detail-sub-row { display: flex; gap: 12px; margin-bottom: 12px; }
.detail-sub-item { font-size: 11px; color: #666; }
.detail-sub-val { color: #aaa; margin-left: 4px; }

/* 하단 탭 (지수/뉴스/감정분석) */
.bottom-tab { display: flex; background: #111118; border-bottom: 1px solid #1e1e2e; border-top: 1px solid #1e1e2e; }
.bottom-tab-item { flex: 1; padding: 10px 0; text-align: center; font-size: 12px; color: #666; cursor: pointer; border-bottom: 2px solid transparent; }
.bottom-tab-item.active { color: #378ADD; border-bottom-color: #378ADD; font-weight: 500; }

/* 탭 콘텐츠 */
.tab-content { display: none; flex-direction: column; gap: 10px; padding: 14px 16px; }
.tab-content.active { display: flex; }

/* 차트 */
.chart-card { background: #13131f; border: 1px solid #1e1e2e; border-radius: 12px; padding: 12px 14px; }
.chart-period-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
.period-tab { background: #1e1e2e; border: none; border-radius: 6px; padding: 4px 10px; font-size: 11px; color: #666; cursor: pointer; }
.period-tab.active { background: #185FA5; color: #fff; }
.chart-wrap { position: relative; height: 180px; }

/* 지수 섹션 */
.index-section-title { font-size: 12px; color: #666; font-weight: 500; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
.index-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.index-card { background: #13131f; border: 1px solid #1e1e2e; border-radius: 12px; padding: 12px 14px; cursor: pointer; transition: border-color 0.2s; }
.index-card:hover { border-color: #378ADD; }
.index-name-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.index-name { font-size: 11px; color: #666; font-weight: 500; }
.index-info-btn { width: 16px; height: 16px; border-radius: 50%; background: #1e1e2e; color: #555; font-size: 9px; display: flex; align-items: center; justify-content: center; font-style: italic; font-weight: 700; border: none; cursor: pointer; }
.index-value { font-size: 18px; font-weight: 700; color: #fff; }
.index-status { font-size: 10px; margin-top: 3px; }

/* 호가 간략 */
.orderbook-mini { background: #13131f; border: 1px solid #1e1e2e; border-radius: 12px; overflow: hidden; }
.orderbook-header { display: flex; padding: 8px 12px; border-bottom: 1px solid #1e1e2e; }
.orderbook-header-item { flex: 1; font-size: 10px; color: #666; text-align: center; }
.orderbook-row { display: flex; padding: 5px 12px; }
.orderbook-cell { flex: 1; font-size: 11px; text-align: center; }
.ask-bg { background: rgba(52, 152, 219, 0.08); }
.bid-bg { background: rgba(231, 76, 60, 0.08); }

/* 팝업 */
.popup-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); display: flex; align-items: flex-end; justify-content: center; z-index: 200; }
.popup-overlay.hidden { display: none; }
.popup-box { background: #13131f; border: 1px solid #1e1e2e; border-radius: 20px 20px 0 0; padding: 24px 20px 48px; width: 100%; max-width: 480px; }
.popup-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.popup-title { font-size: 17px; font-weight: 600; color: #fff; }
.popup-close { background: #1e1e2e; border: none; border-radius: 8px; padding: 6px 12px; color: #aaa; cursor: pointer; font-size: 13px; }
.popup-tag { display: inline-block; background: #185FA522; color: #378ADD; font-size: 10px; padding: 3px 8px; border-radius: 4px; margin-bottom: 10px; }
.popup-desc { font-size: 14px; color: #ccc; line-height: 1.8; }
.popup-example { background: #0a0a0f; border-radius: 10px; padding: 12px 14px; margin-top: 12px; font-size: 12px; color: #888; line-height: 1.6; white-space: pre-line; }

/* 뉴스 */
.news-articles { display: flex; flex-direction: column; gap: 8px; }
.news-article-item { background: #13131f; border: 1px solid #1e1e2e; border-radius: 10px; padding: 10px 12px; }
.news-article-title { font-size: 12px; color: #ddd; line-height: 1.5; margin-bottom: 4px; }
.news-article-link { font-size: 10px; color: #378ADD; text-decoration: none; }
.news-article-time { font-size: 10px; color: #555; }
.news-analysis { background: #13131f; border: 1px solid #1e1e2e; border-radius: 12px; padding: 14px 16px; font-size: 13px; color: #ddd; line-height: 1.7; }
.news-loading { text-align: center; padding: 30px; color: #555; font-size: 13px; }
.news-btn-load { background: #185FA522; border: 1px solid #185FA5; border-radius: 10px; padding: 10px; font-size: 13px; color: #378ADD; cursor: pointer; width: 100%; }

/* AI 채팅 */
.chat-wrap { display: flex; flex-direction: column; gap: 10px; }
.chat-bubble { max-width: 85%; padding: 10px 13px; border-radius: 14px; font-size: 13px; line-height: 1.6; }
.chat-ai { background: #1e1e2e; border-radius: 4px 14px 14px 14px; color: #ddd; align-self: flex-start; }
.chat-ai-label { font-size: 10px; color: #378ADD; margin-bottom: 4px; font-weight: 500; }
.chat-user { background: #185FA5; border-radius: 14px 4px 14px 14px; color: #fff; align-self: flex-end; }
.quick-btns { display: flex; flex-wrap: wrap; gap: 6px; }
.quick-btn { background: #0a0a0f; border: 1px solid #1e1e2e; border-radius: 20px; padding: 6px 12px; font-size: 11px; color: #888; cursor: pointer; transition: all 0.2s; }
.quick-btn:hover, .quick-btn.selected { border-color: #185FA5; color: #378ADD; background: #185FA511; }
.chat-input-area { display: flex; gap: 8px; }
.chat-input { flex: 1; background: #0a0a0f; border: 1px solid #1e1e2e; border-radius: 10px; padding: 8px 12px; font-size: 13px; color: #fff; outline: none; font-family: inherit; resize: none; line-height: 1.4; }
.chat-input:focus { border-color: #185FA5; }
.chat-send { background: #185FA5; border: none; border-radius: 10px; padding: 8px 14px; color: #fff; font-size: 13px; cursor: pointer; }
.chat-send:disabled { background: #1e1e2e; color: #444; cursor: not-allowed; }
.typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
.typing span { width: 6px; height: 6px; background: #378ADD; border-radius: 50%; animation: bounce 1s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

/* MBTI */
.mbti-card { background: #EEEDFE22; border: 1px solid #534AB744; border-radius: 14px; padding: 20px; text-align: center; }
.mbti-type { font-size: 22px; font-weight: 600; color: #AFA9EC; margin-bottom: 4px; }
.mbti-name { font-size: 13px; color: #7F77DD; margin-bottom: 10px; }
.mbti-desc { font-size: 13px; color: #ccc; line-height: 1.6; }
.tip-box { background: #EAF3DE22; border: 1px solid #639922; border-radius: 12px; padding: 12px 14px; font-size: 13px; color: #97C459; line-height: 1.6; }
.card { background: #13131f; border: 1px solid #1e1e2e; border-radius: 14px; padding: 14px 16px; }
.card-label { font-size: 11px; color: #666; margin-bottom: 6px; }
.stat-item { margin-bottom: 10px; }
.stat-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
.stat-label { color: #aaa; }
.stat-val { color: #fff; font-weight: 500; }
.progress-bar { height: 4px; background: #1e1e2e; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; }
.growth-badge { display: inline-block; background: #13131f; border: 1px solid #1e1e2e; border-radius: 20px; padding: 4px 12px; font-size: 11px; color: #666; margin-bottom: 8px; }
.empty-state { text-align: center; padding: 40px 20px; color: #444; font-size: 14px; line-height: 1.8; }
.btn-primary { width: 100%; background: #185FA5; border: none; border-radius: 12px; padding: 13px; font-size: 13px; font-weight: 600; color: #fff; cursor: pointer; }
.btn-outline { width: 100%; background: transparent; border: 1px solid #1e1e2e; border-radius: 12px; padding: 12px; font-size: 13px; color: #aaa; cursor: pointer; }
.kakao-share-btn { width: 100%; background: #FEE500; border: none; border-radius: 12px; padding: 13px; color: #000; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }

/* 기록 */
.history-item { background: #13131f; border: 1px solid #1e1e2e; border-radius: 12px; padding: 14px 16px; cursor: pointer; margin-bottom: 8px; }
.history-body { margin-top: 10px; border-top: 1px solid #1e1e2e; padding-top: 10px; display: none; font-size: 13px; color: #ddd; line-height: 1.6; }
.history-body.open { display: block; }
.notice-text { font-size: 11px; color: #444; text-align: center; padding: 4px 0; }
</style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <div class="header">
    <div class="header-title">📦 투자 블랙박스</div>
    <div class="header-sub">매수 전, 내 감정과 시장을 함께 확인하세요</div>
  </div>

  <!-- 상단 네비 -->
  <div class="top-nav">
    <div class="top-nav-item active" onclick="showTopTab('blackbox', this)">블랙박스</div>
    <div class="top-nav-item" onclick="showTopTab('timemachine', this)">타임머신</div>
    <div class="top-nav-item" onclick="showTopTab('mytype', this)">내 유형</div>
    <div class="top-nav-item" onclick="showTopTab('history', this)">기록</div>
  </div>

  <!-- 콘텐츠 -->
  <div class="content">

    <!-- 블랙박스 메인 (코인 목록) -->
    <div id="page-blackbox" class="page active">
      <div class="coin-list-wrap">
        <div id="coin-list"></div>
      </div>
    </div>

    <!-- 코인 상세 -->
    <div id="page-detail" class="page">
      <div class="coin-detail-header">
        <button class="back-btn" onclick="goBack()">← 목록으로</button>
        <div class="detail-coin-name" id="detail-name"></div>
        <div class="detail-price-row">
          <div class="detail-price" id="detail-price">-</div>
          <div class="detail-change" id="detail-change">-</div>
        </div>
        <div class="detail-sub-row">
          <div class="detail-sub-item">고가 <span class="detail-sub-val up" id="detail-high">-</span></div>
          <div class="detail-sub-item">저가 <span class="detail-sub-val down" id="detail-low">-</span></div>
          <div class="detail-sub-item">전일 <span class="detail-sub-val" id="detail-prev">-</span></div>
          <div class="detail-sub-item">체결강도 <span class="detail-sub-val" id="detail-strength">-</span></div>
        </div>
      </div>

      <!-- 하단 탭 -->
      <div class="bottom-tab">
        <div class="bottom-tab-item active" onclick="showBottomTab('chart', this)">📈 차트</div>
        <div class="bottom-tab-item" onclick="showBottomTab('index', this)">📊 지수</div>
        <div class="bottom-tab-item" onclick="showBottomTab('news', this)">📰 뉴스</div>
        <div class="bottom-tab-item" onclick="showBottomTab('chat', this)">🤖 감정분석</div>
      </div>

      <!-- 차트 탭 -->
      <div id="btab-chart" class="tab-content active">
        <div class="chart-card">
          <div class="chart-period-tabs">
            <button class="period-tab active" onclick="changeChartPeriod('days',this)">일</button>
            <button class="period-tab" onclick="changeChartPeriod('hours',this)">1시간</button>
            <button class="period-tab" onclick="changeChartPeriod('minutes',this)">5분</button>
          </div>
          <div class="chart-wrap"><canvas id="price-chart"></canvas></div>
        </div>
      </div>

      <!-- 지수 탭 -->
      <div id="btab-index" class="tab-content">
        <div class="index-section-title">📊 시장 지수 <span style="font-size:10px;color:#555;">클릭하면 설명 봐요</span></div>
        <div class="index-grid" id="index-grid"></div>

        <div class="index-section-title" style="margin-top:4px;">📋 호가 현황 <span style="font-size:10px;color:#555;">매수/매도 잔량이에요</span></div>
        <div class="orderbook-mini" id="orderbook-mini">
          <div class="orderbook-header">
            <div class="orderbook-header-item">잔량(매도)</div>
            <div class="orderbook-header-item">가격</div>
            <div class="orderbook-header-item">잔량(매수)</div>
          </div>
          <div id="orderbook-rows"></div>
        </div>
        <div style="font-size:10px;color:#555;text-align:center;padding:4px;">
          파란색=팔려는 사람 · 빨간색=사려는 사람
          <button onclick="showIndexPopup('호가')" style="background:none;border:none;color:#378ADD;font-size:10px;cursor:pointer;">호가가 뭔가요? →</button>
        </div>
      </div>

      <!-- 뉴스 탭 -->
      <div id="btab-news" class="tab-content">
        <div id="news-content">
          <button class="news-btn-load" onclick="loadNews()">📰 최신 뉴스 불러오기</button>
        </div>
      </div>

      <!-- 감정분석 탭 -->
      <div id="btab-chat" class="tab-content">
        <div class="chat-wrap" id="chat-messages"></div>
        <div class="quick-btns" id="quick-btns">
          <button class="quick-btn" onclick="selectQuick(this,'뉴스에서 오른다고 봤어요')">뉴스 봤어요</button>
          <button class="quick-btn" onclick="selectQuick(this,'친구가 샀다고 해서요')">친구 따라서요</button>
          <button class="quick-btn" onclick="selectQuick(this,'그냥 오를 것 같아요')">그냥 살까요</button>
          <button class="quick-btn" onclick="selectQuick(this,'떨어져서 지금이 기회 같아요')">저점 같아요</button>
          <button class="quick-btn" onclick="selectQuick(this,'유튜브에서 추천해서요')">유튜브 봤어요</button>
        </div>
        <div class="chat-input-area">
          <textarea class="chat-input" id="chat-input" rows="2" placeholder="매수 이유를 말해줘요..." onkeydown="handleKey(event)"></textarea>
          <button class="chat-send" id="chat-send" onclick="sendChat()">전송</button>
        </div>
      </div>
    </div>

    <!-- 타임머신 -->
    <div id="page-timemachine" class="page">
      <div id="timemachine-container" style="width:100%;height:calc(100vh - 110px);"></div>
    </div>

    <!-- 내 유형 -->
    <div id="page-mytype" class="page">
      <div style="padding:16px;" id="mbti-content">
        <div class="empty-state">아직 분석 기록이 없어요.<br>블랙박스에서 분석해보세요!</div>
      </div>
    </div>

    <!-- 기록 -->
    <div id="page-history" class="page">
      <div style="padding:16px;" id="history-content">
        <div class="empty-state">아직 기록이 없어요.</div>
      </div>
    </div>

  </div>
</div>

<!-- 팝업 -->
<div class="popup-overlay hidden" id="popup-overlay" onclick="closePopup(event)">
  <div class="popup-box">
    <div class="popup-header">
      <div>
        <div class="popup-title" id="popup-title"></div>
        <div class="popup-tag" id="popup-tag"></div>
      </div>
      <button class="popup-close" onclick="closePopupDirect()">닫기</button>
    </div>
    <div class="popup-desc" id="popup-desc"></div>
    <div class="popup-example" id="popup-example"></div>
  </div>
</div>

<script>
const BACKEND_URL = "https://skyshhackathon-production.up.railway.app";

const COINS = [
  { market: "KRW-BTC", name: "비트코인", symbol: "BTC", desc: "디지털 금. 코인 시장 전체 분위기를 이끌어요." },
  { market: "KRW-ETH", name: "이더리움", symbol: "ETH", desc: "앱스토어 같은 코인. 수많은 서비스가 여기서 돌아가요." },
  { market: "KRW-XRP", name: "리플", symbol: "XRP", desc: "국제 송금 전용 코인. 은행들이 주목하고 있어요." },
  { market: "KRW-SOL", name: "솔라나", symbol: "SOL", desc: "더 빠르고 저렴한 이더리움 대안이에요." },
  { market: "KRW-DOGE", name: "도지코인", symbol: "DOGE", desc: "밈에서 시작된 코인. 유명인 발언에 민감해요." },
  { market: "KRW-ADA", name: "에이다", symbol: "ADA", desc: "학술 연구 기반으로 꼼꼼하게 만든 코인이에요." },
  { market: "KRW-AVAX", name: "아발란체", symbol: "AVAX", desc: "빠른 이더리움 대안. 처리 속도가 강점이에요." },
  { market: "KRW-LINK", name: "체인링크", symbol: "LINK", desc: "블록체인과 현실 세계를 연결하는 다리 역할이에요." },
];

// 시장 데이터
async function loadDetailData(market) {
  try {
    const data = await fetch(`${BACKEND_URL}/api/coin/${market}`).then(r => r.json());
    const ticker = data.ticker;
    const candles = data.candles;
    const orderbook = data.orderbook;

    const t = ticker[0];
    const price = t.trade_price;
    const rate = (t.signed_change_rate * 100).toFixed(2);

    document.getElementById('detail-price').textContent = price.toLocaleString() + '원';
    const chEl = document.getElementById('detail-change');
    chEl.textContent = (rate > 0 ? '▲ +' : '▼ ') + rate + '%';
    chEl.className = 'detail-change ' + (rate > 0 ? 'up' : 'down');
    document.getElementById('detail-high').textContent = t.high_price.toLocaleString() + '원';
    document.getElementById('detail-low').textContent = t.low_price.toLocaleString() + '원';
    document.getElementById('detail-prev').textContent = t.prev_closing_price.toLocaleString() + '원';

    const rsi = calcRSI(candles);
    const avgVol = candles.reduce((s,c) => s + c.candle_acc_trade_volume, 0) / candles.length;
    const volRatio = (candles[0].candle_acc_trade_volume / avgVol).toFixed(1);
    const highs = candles.map(c => c.high_price);
    const lows = candles.map(c => c.low_price);
    const h52 = Math.max(...highs), l52 = Math.min(...lows);
    const pos52 = h52 !== l52 ? ((price - l52) / (h52 - l52) * 100).toFixed(1) : 50;
    const ob = orderbook[0];
    const totalBid = ob.orderbook_units.reduce((s,u) => s + u.bid_size, 0);
    const totalAsk = ob.orderbook_units.reduce((s,u) => s + u.ask_size, 0);
    const bidAskRatio = (totalBid / totalAsk).toFixed(2);
    const pressure = bidAskRatio > 1.2 ? '매수 우세' : bidAskRatio < 0.8 ? '매도 우세' : '균형';
    const strength = (totalBid / (totalBid + totalAsk) * 100).toFixed(1);
    document.getElementById('detail-strength').textContent = strength + '%';
    document.getElementById('detail-strength').style.color = strength > 50 ? '#e74c3c' : '#3498db';
    const fg = calcFG(rsi, parseFloat(rate), parseFloat(volRatio));
    const todayRange = (((t.high_price - t.low_price) / t.low_price) * 100).toFixed(1);

    marketCtx = { price, rate: parseFloat(rate), rsi, volRatio: parseFloat(volRatio), pos52: parseFloat(pos52), pressure, bidAskRatio: parseFloat(bidAskRatio), fg, todayRange: parseFloat(todayRange), strength: parseFloat(strength) };

    renderIndexGrid(rsi, volRatio, pos52, pressure, bidAskRatio, fg, todayRange, strength);
    renderOrderbook(ob.orderbook_units.slice(0, 5), price);
  } catch(e) { console.error(e); }
}

  const [fgLabel, fgColor] = getFearGreedLabel(fg);

  const indices = [
    { key: "RSI", value: rsi, status: rsi >= 70 ? '⚠️ 과매수' : rsi <= 30 ? '⚠️ 과매도' : '✅ 중립', cls: rsi >= 70 || rsi <= 30 ? 'warn' : 'green' },
    { key: "체결강도", value: strength + '%', status: strength > 60 ? '🔴 매수 강세' : strength < 40 ? '🔵 매도 강세' : '⚖️ 균형', cls: strength > 60 ? 'up' : strength < 40 ? 'down' : 'neutral' },
    { key: "거래량", value: volRatio + '배', status: volRatio >= 2 ? '🔥 평소보다 많음' : volRatio <= 0.5 ? '😴 한산함' : '📊 보통', cls: volRatio >= 2 ? 'warn' : 'neutral' },
    { key: "52주 위치", value: pos52 + '%', status: pos52 >= 80 ? '📈 고점 근처' : pos52 <= 20 ? '📉 저점 근처' : '📊 중간', cls: pos52 >= 80 ? 'warn' : pos52 <= 20 ? 'green' : 'neutral' },
    { key: "매수/매도 압력", value: pressure, status: ratio > 1.2 ? '🟢 사려는 사람 많음' : ratio < 0.8 ? '🔴 팔려는 사람 많음' : '⚖️ 균형', cls: ratio > 1.2 ? 'up' : ratio < 0.8 ? 'down' : 'neutral' },
    { key: "시장 온도", value: fg + '/100', status: fgLabel, cls: fg >= 55 ? 'warn' : fg <= 25 ? 'down' : 'neutral' },

// 차트
async function loadChart(market, period) {
  let url = '';
  if (period === 'days') url = `${BACKEND_URL}/api/upbit/candles/days?market=${market}&count=30`;
  else if (period === 'hours') url = `${BACKEND_URL}/api/upbit/candles/minutes/60?market=${market}&count=48`;
  else url = `${BACKEND_URL}/api/upbit/candles/minutes/5?market=${market}&count=60`;

  try {
    const data = await fetch(url).then(r => r.json());
    const reversed = [...data].reverse();
    const labels = reversed.map(d => {
      const dt = new Date(d.candle_date_time_kst);
      if (period === 'days') return (dt.getMonth()+1) + '/' + dt.getDate();
      return dt.getHours() + ':' + String(dt.getMinutes()).padStart(2,'0');
    });

    const allPrices = reversed.flatMap(d => [d.opening_price, d.high_price, d.low_price, d.trade_price]);
    const minPrice = Math.min(...allPrices);
    const maxPrice = Math.max(...allPrices);
    const padding = (maxPrice - minPrice) * 0.1;

    if (chartInstance) chartInstance.destroy();
    const ctx = document.getElementById('price-chart').getContext('2d');

    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            label: '몸통',
            data: reversed.map(d => [
              Math.min(d.opening_price, d.trade_price),
              Math.max(d.opening_price, d.trade_price)
            ]),
            backgroundColor: reversed.map(d => d.trade_price >= d.opening_price ? 'rgba(231,76,60,0.85)' : 'rgba(52,152,219,0.85)'),
            borderColor: reversed.map(d => d.trade_price >= d.opening_price ? '#e74c3c' : '#3498db'),
            borderWidth: 1,
            borderSkipped: false,
          },
          {
            label: '고저선',
            data: reversed.map(d => [d.low_price, d.high_price]),
            backgroundColor: reversed.map(d => d.trade_price >= d.opening_price ? 'rgba(231,76,60,0.4)' : 'rgba(52,152,219,0.4)'),
            borderColor: 'transparent',
            borderWidth: 0,
            barPercentage: 0.15,
            borderSkipped: false,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            ticks: { color: '#555', maxTicksLimit: period === 'days' ? 8 : 6, font: { size: 9 } },
            grid: { color: '#1e1e2e' }
          },
          y: {
            min: minPrice - padding,
            max: maxPrice + padding,
            ticks: { color: '#555', font: { size: 9 }, callback: v => {
              if (v >= 1000000) return (v/1000000).toFixed(1) + 'M';
              if (v >= 1000) return (v/1000).toFixed(0) + 'K';
              return v;
            }},
            grid: { color: '#1e1e2e' }
          }
        }
      }
    });
  } catch(e) { console.error(e); }
}

// WebSocket
function startWebSocket(market) {
  closeWebSocket();
  try {
    const ws = new WebSocket('wss://api.upbit.com/websocket/v1');
    ws.onopen = () => ws.send(JSON.stringify([{ ticket: 'blackbox' }, { type: 'ticker', codes: [market] }]));
    ws.onmessage = async (e) => {
      const buf = await e.data.arrayBuffer();
      const data = JSON.parse(new TextDecoder().decode(buf));
      if (data.type === 'ticker') {
        const price = data.trade_price;
        const rate = (data.signed_change_rate * 100).toFixed(2);
        const priceEl = document.getElementById('detail-price');
        const oldPrice = parseInt(priceEl.dataset.raw || 0);
        priceEl.dataset.raw = price;
        priceEl.style.color = price > oldPrice ? '#e74c3c' : price < oldPrice ? '#3498db' : '#fff';
        priceEl.textContent = price.toLocaleString() + '원';
        setTimeout(() => { priceEl.style.color = '#fff'; }, 1000);
        const chEl = document.getElementById('detail-change');
        chEl.textContent = (rate > 0 ? '▲ +' : '▼ ') + rate + '%';
        chEl.className = 'detail-change ' + (rate > 0 ? 'up' : 'down');
        marketCtx.price = price;
        marketCtx.rate = parseFloat(rate);
      }
    };
    ws.onerror = () => {};
    wsConnections['main'] = ws;
  } catch(e) {}
}
function closeWebSocket() {
  Object.values(wsConnections).forEach(ws => { try { ws.close(); } catch(e){} });
  wsConnections = {};
}

async function loadNews() {
  const newsContent = document.getElementById('news-content');
  newsContent.innerHTML = '<div class="news-loading">📰 최신 뉴스 불러오는 중...</div>';
  try {
    const res = await fetch(`${BACKEND_URL}/api/news`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ coin: currentCoinName, context: marketCtx })
    });
    const data = await res.json();
    let html = '<div class="news-articles">';
    if (data.articles && data.articles.length > 0) {
      html += data.articles.map(a => `
        <div class="news-article-item">
          <div class="news-article-title">${a.title}</div>
          <div style="display:flex;justify-content:space-between;margin-top:4px;">
            <span class="news-article-time">${a.published ? new Date(a.published).toLocaleDateString('ko-KR') : ''}</span>
            <a class="news-article-link" href="${a.link}" target="_blank">기사 보기 →</a>
          </div>
        </div>`).join('');
    }
    html += '</div>';
    if (data.result) {
      html += `<div class="news-analysis">${data.result.replace(/\n/g,'<br>').replace(/##\s*/g,'<br><strong>').replace(/\*\*/g,'')}</div>`;
    }
    newsContent.innerHTML = html;

async function sendChat() {
  const input = document.getElementById('chat-input').value.trim();
  if (!input) return;
  document.getElementById('chat-input').value = '';
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('selected'));
  if (chatHistory.length > 0) document.getElementById('quick-btns').style.display = 'none';
  addUserBubble(input);
  document.getElementById('chat-send').disabled = true;

  chatHistory.push({ role: 'user', content: input });

  const typingEl = addTyping();
  try {
    const res = await fetch(`${BACKEND_URL}/api/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ input, coin: currentCoinName, context: marketCtx, history: chatHistory.slice(-10) })
    });
    const data = await res.json();
    typingEl.remove();
    const text = data.result || '';
    const emotion = data.emotion || '냉정';
    const cleaned = text.replace(/\[EMOTION:[^\]]+\]/g, '').trim();
    addAIBubble(cleaned);
    chatHistory.push({ role: 'assistant', content: cleaned });

    emotions.push(emotion);
    analysisHistory.push({ coin: currentCoinName, input, emotion, time: new Date().toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }) });
    localStorage.setItem('bh', JSON.stringify(analysisHistory));
    localStorage.setItem('be', JSON.stringify(emotions));
  } catch(e) {
    typingEl.remove();
    addAIBubble('잠시 오류가 났어요. 다시 시도해줘요!');
  }
  document.getElementById('chat-send').disabled = false;
}

function typeWriter(el, text, speed = 12) {
  let i = 0;
  el.innerHTML = '';
  const interval = setInterval(() => {
    if (i < text.length) {
      el.innerHTML += text[i] === '\n' ? '<br>' : text[i];
      i++;
      const msgs = document.getElementById('chat-messages');
      msgs.scrollTop = msgs.scrollHeight;
    } else clearInterval(interval);
  }, speed);
}

// 계산
function calcRSI(candles) {
  const closes = candles.map(c => c.trade_price).reverse();
  let gains = 0, losses = 0;
  for (let i = 1; i < closes.length; i++) {
    const d = closes[i] - closes[i-1];
    if (d > 0) gains += d; else losses -= d;
  }
  const p = closes.length - 1;
  const ag = gains/p, al = losses/p;
  if (al === 0) return 100;
  return Math.round(100 - 100/(1 + ag/al));
}

function calcFG(rsi, rate, volRatio) {
  let s = 50;
  if (rsi >= 70) s += 20; else if (rsi >= 60) s += 10;
  else if (rsi <= 30) s -= 20; else if (rsi <= 40) s -= 10;
  if (rate >= 10) s += 15; else if (rate >= 5) s += 8;
  else if (rate <= -10) s -= 15; else if (rate <= -5) s -= 8;
  if (volRatio >= 3) s += 10; else if (volRatio >= 2) s += 5;
  else if (volRatio <= 0.5) s -= 10;
  return Math.max(0, Math.min(100, Math.round(s)));
}

function getFearGreedLabel(score) {
  if (score >= 75) return ['극도의 탐욕 🔴', '#e74c3c'];
  if (score >= 55) return ['탐욕 🟠', '#e67e22'];
  if (score >= 45) return ['중립 🟡', '#f39c12'];
  if (score >= 25) return ['공포 🔵', '#3498db'];
  return ['극도의 공포 🟣', '#9b59b6'];
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => alert('📋 복사됐어요!\n카카오톡에 붙여넣기 해보세요.')).catch(() => {
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    alert('📋 복사됐어요!');
  });
}

<div id="screen-result" class="screen">
    <h2 style="text-align:center;">📊 투자 성적표</h2>
    <div class="main-layout">
        <div class="left-panel">
            <div class="chart-header" style="margin-bottom:8px;">
                <span style="color:#aaa;font-size:14px;">복기 차트 (매수/매도 타점)</span>
                <select id="result-ticker-switch" style="background:#1e1e2e;color:#fff;border:1px solid #378ADD;padding:4px;border-radius:6px;font-size:13px;"></select>
            </div>
            <div class="chart-container" style="height:280px;">
                <canvas id="resultChart"></canvas>
            </div>
            <div class="info-box" style="margin-top:12px;">
                <div style="display:flex;justify-content:space-between;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #1e1e2e;">
                    <span style="color:#aaa;">시작 시드</span>
                    <span style="font-weight:bold;color:#fff;" id="res-start-seed">0 원</span>
                </div>
                <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                    <span style="color:#aaa;">최종 자산</span>
                    <span style="font-weight:bold;color:#fff;" id="res-end-seed">0 원</span>
                </div>
                <div style="display:flex;justify-content:space-between;">
                    <span style="color:#aaa;">최종 수익률</span>
                    <span style="font-size:18px;font-weight:bold;" id="res-roi">0%</span>
                </div>
            </div>
            <div style="margin-top:12px;">
                <div style="font-size:13px;font-weight:500;color:#aaa;margin-bottom:6px;">체결 로그</div>
                <div style="border:1px solid #1e1e2e;border-radius:8px;padding:10px;background:#0a0a0f;font-size:12px;color:#aaa;max-height:100px;overflow-y:auto;" id="trade-log-container"></div>
            </div>
        </div>
        <div class="right-panel" style="border-left:3px solid #378ADD;">
            <h3>✨ AI 매매 진단</h3>
            <div id="ai-report-content" style="line-height:1.7;font-size:13px;color:#ccc;"><p style="color:#555;">분석 중...</p></div>
        </div>
    </div>
    <button onclick="location.reload()" style="width:100%;margin-top:16px;background:#333;padding:12px;">처음으로</button>
</div>

<div id="news-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header" id="modal-title"></div>
        <div class="modal-body" id="modal-body"></div>
        <button id="modal-close-btn" style="width:100%;background:#333;">닫기</button>
    </div>
</div>

<script type="module">
    const BACKEND_URL = "https://skyshhackathon-production.up.railway.app";
    
    let state = {
        current_index: 0, is_running: false, speed_multiplier: 1.0,
        base_interval: 1000, seed: 0, start_seed: 0, holding_qty: 0, avg_price: 0,
        pending_orders: [], selected_coin: "BTC", trade_logs: [], executed_points: []
    };
    let market_data = [];
    let timerId;
    let mainChart;
    let resultChart;

    document.getElementById("start-btn").addEventListener("click", startSimulation);
    document.getElementById("play-btn").addEventListener("click", togglePlay);
    document.getElementById("speed-05").addEventListener("click", () => setSpeed(0.5));
    document.getElementById("speed-10").addEventListener("click", () => setSpeed(1.0));
    document.getElementById("speed-20").addEventListener("click", () => setSpeed(2.0));
    document.getElementById("tab-orderbook").addEventListener("click", () => switchTab('orderbook'));
    document.getElementById("tab-news").addEventListener("click", () => switchTab('news'));
    document.getElementById("buy-btn").addEventListener("click", () => executeTrade('BUY'));
    document.getElementById("sell-btn").addEventListener("click", () => executeTrade('SELL'));
    document.getElementById("end-btn").addEventListener("click", endSimulation);
    document.getElementById("modal-close-btn").addEventListener("click", closeNewsModal);
    document.getElementById("news-modal").addEventListener("click", closeNewsModal);
    document.querySelector(".modal-content").addEventListener("click", e => e.stopPropagation());

    document.getElementById("ticker-switch").addEventListener("change", e => {
        state.selected_coin = e.target.value;
        state.holding_qty = 0; state.avg_price = 0;
        document.getElementById('holding-qty').innerText = 0;
        document.getElementById('avg-price').innerText = 0;
        if (mainChart) { mainChart.data.labels = []; mainChart.data.datasets.forEach(d => d.data = []); }
        updateChartAndOrderbook(state.current_index);
    });

    document.getElementById("result-ticker-switch").addEventListener("change", e => {
        renderResultChart(e.target.value);
    });

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-view'));
        if (tabName === 'orderbook') {
            document.getElementById('tab-orderbook').classList.add('active-tab');
            document.getElementById('view-orderbook').classList.add('active-view');
        } else {
            document.getElementById('tab-news').classList.add('active-tab');
            document.getElementById('view-news').classList.add('active-view');
        }
    }

    async function startSimulation() {
        const scenarioKey = document.getElementById("setup-scenario").value;
        const year = scenarioKey.split('_')[0];
        try {
            const res = await fetch(\`\${BACKEND_URL}/api/timemachine/\${year}\`);
            if (!res.ok) throw new Error('데이터 로드 실패');
            market_data = await res.json();
        } catch(error) {
            alert("데이터 로드 실패: " + error.message);
            return;
        }

        const allKeys = new Set();
        market_data.forEach(row => Object.keys(row).forEach(k => allKeys.add(k)));
        const availableCoins = Array.from(allKeys).filter(k => k.endsWith("_close")).map(k => k.replace("_close",""));

        if (availableCoins.length === 0) { alert("코인 데이터 없음"); return; }

        const selectBox = document.getElementById("ticker-switch");
        const resSelectBox = document.getElementById("result-ticker-switch");
        selectBox.innerHTML = ""; resSelectBox.innerHTML = "";
        availableCoins.forEach(coin => {
            selectBox.innerHTML += \`<option value="\${coin}">\${coin}</option>\`;
            resSelectBox.innerHTML += \`<option value="\${coin}">\${coin}</option>\`;
        });

        state.selected_coin = availableCoins[0];
        state.start_seed = parseInt(document.getElementById('setup-seed').value);
        state.seed = state.start_seed;
        document.getElementById('seed-info').innerText = \`예수금: \${state.seed.toLocaleString()} 원\`;

        switchScreen('screen-main');
        initChart();
    }

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        mainChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: '현재가', data: [], borderColor: '#E6F1FB', borderWidth: 2, pointRadius: 0, tension: 0.1 },
                    { label: 'BB상단', data: [], borderColor: 'rgba(231,76,60,0.5)', borderWidth: 1, borderDash: [4,4], pointRadius: 0, fill: false },
                    { label: 'BB중간', data: [], borderColor: 'rgba(150,150,150,0.4)', borderWidth: 1, pointRadius: 0, fill: false },
                    { label: 'BB하단', data: [], borderColor: 'rgba(52,152,219,0.5)', borderWidth: 1, borderDash: [4,4], pointRadius: 0, fill: false }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#aaa', font: { size: 11 } } } },
                scales: {
                    x: { grid: { color: '#1e1e2e' }, ticks: { color: '#555', maxTicksLimit: 6, font: { size: 10 } } },
                    y: { position: 'right', grid: { color: '#1e1e2e' }, ticks: { color: '#555', font: { size: 10 } } }
                }
            }
        });
        state.current_index = 0;
        updateChartAndOrderbook(0);
    }

    function updateChartAndOrderbook(index) {
        if (index >= market_data.length) return endSimulation();
        const row = market_data[index];
        const coin = state.selected_coin;
        const price = row[\`\${coin}_close\`];
        if (!price) { state.current_index++; setTimeout(() => updateChartAndOrderbook(state.current_index), 50); return; }

        mainChart.data.labels.push(row.date);
        mainChart.data.datasets[0].data.push(price);
        mainChart.data.datasets[1].data.push(row[\`\${coin}_upper\`] || null);
        mainChart.data.datasets[2].data.push(row[\`\${coin}_middle\`] || null);
        mainChart.data.datasets[3].data.push(row[\`\${coin}_lower\`] || null);
        if (mainChart.data.labels.length > 30) {
            mainChart.data.labels.shift();
            mainChart.data.datasets.forEach(d => d.data.shift());
        }
        mainChart.update('none');

        const rsi = row.rsi || row[\`\${coin}_rsi\`];
        const rsiBadge = document.getElementById('rsi-badge');
        rsiBadge.innerText = rsi ? \`RSI: \${parseFloat(rsi).toFixed(1)}\` : 'RSI: --';
        rsiBadge.style.background = rsi >= 70 ? 'rgba(231,76,60,0.2)' : rsi <= 30 ? 'rgba(52,152,219,0.2)' : '#1e1e2e';
        rsiBadge.style.color = rsi >= 70 ? '#e74c3c' : rsi <= 30 ? '#3498db' : '#aaa';

        const gap = price > 1000000 ? 50000 : price > 100000 ? 1000 : 10;
        document.getElementById('current-price').innerText = price.toLocaleString() + " 원";
        document.getElementById('ask-p-2').innerText = (price + gap*2).toLocaleString();
        document.getElementById('ask-p-1').innerText = (price + gap).toLocaleString();
        document.getElementById('bid-p-1').innerText = (price - gap).toLocaleString();
        document.getElementById('bid-p-2').innerText = (price - gap*2).toLocaleString();
        document.getElementById('ask-qty-2').innerText = Math.floor(50 + (index%11)*8);
        document.getElementById('ask-qty-1').innerText = Math.floor(40 + (index%7)*12);
        document.getElementById('bid-qty-1').innerText = Math.floor(45 + (index%9)*10);
        document.getElementById('bid-qty-2').innerText = Math.floor(30 + (index%13)*7);

        document.getElementById('ask-row-2').onclick = () => document.getElementById('order-price').value = price + gap*2;
        document.getElementById('ask-row-1').onclick = () => document.getElementById('order-price').value = price + gap;
        document.getElementById('bid-row-1').onclick = () => document.getElementById('order-price').value = price - gap;
        document.getElementById('bid-row-2').onclick = () => document.getElementById('order-price').value = price - gap*2;

        const evalValue = state.holding_qty * price;
        document.getElementById('eval-value').innerText = Math.round(evalValue).toLocaleString();
        if (state.holding_qty > 0) {
            const profitRatio = (((price - state.avg_price) / state.avg_price) * 100).toFixed(2);
            const profitWon = Math.round((price - state.avg_price) * state.holding_qty);
            const color = profitRatio > 0 ? '#e74c3c' : profitRatio < 0 ? '#3498db' : '#fff';
            document.getElementById('eval-profit').innerText = \`\${profitRatio>0?'+':''}\${profitRatio}% (\${profitRatio>0?'+':''}\${profitWon.toLocaleString()}원)\`;
            document.getElementById('eval-profit').style.color = color;
        } else {
            document.getElementById('eval-profit').innerText = "0%";
            document.getElementById('eval-profit').style.color = '#fff';
        }

        if (row.hasNews) injectNews(row.date, row.newsTitle, row.newsContent);
    }

    function injectNews(time, title, content) {
        const container = document.getElementById('news-container');
        if (container.innerHTML.includes("아직 뉴스가 없습니다.")) container.innerHTML = "";
        if (container.innerHTML.includes(title)) return;
        const li = document.createElement('li');
        li.className = 'news-item';
        li.dataset.title = title; li.dataset.content = content;
        li.onclick = function() { openNewsModal(this.dataset.title, this.dataset.content); };
        li.innerHTML = \`<div class="news-time">\${time}</div><div class="news-title">\${title}</div>\`;
        container.insertBefore(li, container.firstChild);
    }

    function openNewsModal(title, content) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-body').innerText = content;
        document.getElementById('news-modal').style.display = 'flex';
    }
    function closeNewsModal() { document.getElementById('news-modal').style.display = 'none'; }

    function executeTrade(type) {
        const p = parseInt(document.getElementById('order-price').value);
        const q = parseFloat(document.getElementById('order-qty').value);
        if (!p || !q) return alert("가격과 수량을 입력하세요.");
        if (type === 'BUY' && p*q > state.seed) return alert("예수금 부족!");
        if (type === 'SELL' && q > state.holding_qty) return alert("보유수량 부족!");
        state.pending_orders.push({ type, price: p, qty: q, coin: state.selected_coin });
        alert(\`[주문접수] \${p.toLocaleString()}원 \${q}개 \${type==='BUY'?'매수':'매도'} 대기\`);
    }

    function timeLoop() {
        if (!state.is_running) return;
        state.current_index++;
        if (state.current_index >= market_data.length) return endSimulation();
        const row = market_data[state.current_index];
        document.getElementById('time-display').innerText = row.date;
        requestAnimationFrame(() => {
            updateChartAndOrderbook(state.current_index);
            const price = row[\`\${state.selected_coin}_close\`];
            if (price) checkPendingOrders(price);
        });
    }

    function checkPendingOrders(currentPrice) {
        for (let i = state.pending_orders.length - 1; i >= 0; i--) {
            const order = state.pending_orders[i];
            if (order.coin !== state.selected_coin) continue;
            let triggered = false;
            if (order.type === 'BUY' && currentPrice <= order.price && order.price*order.qty <= state.seed) {
                const totalCost = state.avg_price*state.holding_qty + order.price*order.qty;
                state.holding_qty += order.qty;
                state.avg_price = Math.round(totalCost / state.holding_qty);
                state.seed -= order.price * order.qty;
                triggered = true;
            } else if (order.type === 'SELL' && currentPrice >= order.price && order.qty <= state.holding_qty) {
                state.holding_qty -= order.qty;
                state.seed += currentPrice * order.qty;
                if (state.holding_qty === 0) state.avg_price = 0;
                triggered = true;
            }
            if (triggered) {
                const log = \`[\${order.type}] \${order.coin} \${order.price.toLocaleString()}원 \${order.qty}개 체결\`;
                state.trade_logs.push(log);
                state.executed_points.push({ index: state.current_index, price: order.price, type: order.type, coin: order.coin });
                alert(\`✨ 체결: \${log}\`);
                state.pending_orders.splice(i, 1);
                document.getElementById('seed-info').innerText = \`예수금: \${Math.round(state.seed).toLocaleString()} 원\`;
                document.getElementById('holding-qty').innerText = state.holding_qty;
                document.getElementById('avg-price').innerText = state.avg_price.toLocaleString();
            }
        }
    }

    function togglePlay() {
        state.is_running = !state.is_running;
        document.getElementById('play-btn').innerText = state.is_running ? "⏸ 일시정지" : "▶ 시작";
        if (state.is_running) {
            timerId = setInterval(timeLoop, state.base_interval / state.speed_multiplier);
        } else {
            clearInterval(timerId);
        }
    }

    function setSpeed(speed) {
        state.speed_multiplier = speed;
        if (state.is_running) { clearInterval(timerId); timerId = setInterval(timeLoop, state.base_interval / speed); }
    }

    function endSimulation() {
        state.is_running = false;
        clearInterval(timerId);
        const lastRow = market_data[state.current_index] || market_data[market_data.length-1];
        const lastPrice = lastRow[\`\${state.selected_coin}_close\`] || 0;
        const finalAsset = state.seed + state.holding_qty * lastPrice;
        document.getElementById('res-start-seed').innerText = state.start_seed.toLocaleString() + " 원";
        document.getElementById('res-end-seed').innerText = Math.round(finalAsset).toLocaleString() + " 원";
        const roi = ((finalAsset - state.start_seed) / state.start_seed * 100).toFixed(2);
        document.getElementById('res-roi').innerText = (roi >= 0 ? "+" : "") + roi + "%";
        document.getElementById('res-roi').style.color = roi >= 0 ? '#e74c3c' : '#3498db';
        document.getElementById('trade-log-container').innerHTML = state.trade_logs.length
            ? state.trade_logs.map(l => \`<p style="margin:3px 0;">⏱ \${l}</p>\`).join("")
            : "<p style='color:#555;margin:0;'>체결 없음</p>";
        document.getElementById("result-ticker-switch").value = state.selected_coin;
        switchScreen('screen-result');
        renderResultChart(state.selected_coin);
        setTimeout(() => {
            const good = roi >= 0;
            document.getElementById('ai-report-content').innerHTML = \`
                <p><strong>1. 매매 경향:</strong> \${good ? '분할 매수 전략으로 안정적인 수익을 달성했어요.' : 'FOMO성 고점 진입 패턴이 관측돼요. 하락 임계점에서 손절 타이밍을 놓쳤어요.'}</p>
                <p><strong>2. 리스크:</strong> 볼린저밴드 하단 이탈 시점의 추가 매수는 위험할 수 있어요. 분할 비율(%) 진입을 권장해요.</p>
                <p><strong>3. 종합:</strong> RSI 과매도 구간 진입 시 분할 매수, 과매수 구간에서 분할 매도 전략이 가장 안전해요.</p>
            \`;
        }, 500);
    }

    function renderResultChart(coinTicker) {
        const ctx = document.getElementById('resultChart').getContext('2d');
        const labels = market_data.map(r => r.date);
        const prices = market_data.map(r => r[\`\${coinTicker}_close\`]);
        const buyPoints = new Array(market_data.length).fill(null);
        const sellPoints = new Array(market_data.length).fill(null);
        state.executed_points.forEach(pt => {
            if (pt.coin === coinTicker) {
                if (pt.type === 'BUY') buyPoints[pt.index] = pt.price;
                if (pt.type === 'SELL') sellPoints[pt.index] = pt.price;
            }
        });
        if (resultChart) resultChart.destroy();
        resultChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    { label: '종가', data: prices, borderColor: '#378ADD', borderWidth: 2, pointRadius: 0, tension: 0.1, fill: false },
                    { label: '매수', data: buyPoints, borderColor: '#e74c3c', backgroundColor: '#e74c3c', pointRadius: 6, showLine: false },
                    { label: '매도', data: sellPoints, borderColor: '#3498db', backgroundColor: '#3498db', pointRadius: 6, showLine: false }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#aaa', font: { size: 11 } } } },
                scales: {
                    x: { grid: { color: '#1e1e2e' }, ticks: { color: '#555', maxTicksLimit: 8, font: { size: 10 } } },
                    y: { position: 'right', grid: { color: '#1e1e2e' }, ticks: { color: '#555', font: { size: 10 } } }
                }
            }
        });
    }
<\/script>
</body>
</html>`;
  
  container.appendChild(iframe);
}
</script>
</body>
</html>
