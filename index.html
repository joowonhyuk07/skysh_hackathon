<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 블랙박스</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
.header { background: #0C447C; padding: 16px 20px 12px; }
.header-title { font-size: 18px; font-weight: 600; color: #E6F1FB; }
.header-sub { font-size: 12px; color: #85B7EB; margin-top: 2px; }
.nav { display: flex; background: #111118; border-bottom: 1px solid #1e1e2e; }
.nav-item { flex: 1; padding: 10px 0; text-align: center; font-size: 12px; color: #666; cursor: pointer; border-bottom: 2px solid transparent; }
.nav-item.active { color: #378ADD; border-bottom-color: #378ADD; font-weight: 500; }
.content { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.page { display: none; flex-direction: column; gap: 12px; }
.page.active { display: flex; }
.detail-price { transition: color 0.5s ease; }
.price-roller {
  overflow: hidden;
  height: 1.2em;
  display: inline-block;
}
.price-roller-inner {
  display: flex;
  flex-direction: column;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.price-roller-inner span {
  height: 1.2em;
  line-height: 1.2em;
}
.news-section { background: #13131f; border: 1px solid #1e1e2e; border-radius: 14px; overflow: hidden; }
.news-header { padding: 12px 16px; border-bottom: 1px solid #1e1e2e; display: flex; justify-content: space-between; align-items: center; }
.news-header-title { font-size: 13px; font-weight: 500; color: #aaa; }
.news-close-btn { background: #1e1e2e; border: none; border-radius: 8px; padding: 5px 10px; font-size: 11px; color: #aaa; cursor: pointer; }
.news-articles { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
.news-article-item { background: #0a0a0f; border: 1px solid #1e1e2e; border-radius: 10px; padding: 10px 12px; }
.news-article-title { font-size: 12px; color: #ddd; line-height: 1.5; margin-bottom: 4px; }
.news-article-time { font-size: 10px; color: #555; }
.news-article-link { font-size: 10px; color: #378ADD; text-decoration: none; }
.news-analysis { padding: 12px 16px; border-top: 1px solid #1e1e2e; font-size: 13px; color: #ddd; line-height: 1.7; }
.news-loading { padding: 20px; text-align: center; color: #555; font-size: 13px; }
/* 코인 목록 */
.section-title { font-size: 13px; font-weight: 500; color: #666; margin-bottom: 4px; }
.coin-list { display: flex; flex-direction: column; gap: 8px; }
.coin-card { background: #13131f; border: 1px solid #1e1e2e; border-radius: 14px; padding: 14px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.2s; }
.coin-card:hover { border-color: #185FA5; }
.coin-left { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.coin-name { font-size: 15px; font-weight: 600; color: #fff; }
.coin-desc { font-size: 11px; color: #666; line-height: 1.4; }
.coin-right { text-align: right; flex-shrink: 0; margin-left: 12px; }
.coin-price { font-size: 15px; font-weight: 600; color: #fff; }
.coin-change { font-size: 11px; margin-top: 2px; }
.up { color: #2ecc71; }
.down { color: #e74c3c; }
.neutral { color: #666; }
.warn { color: #f39c12; }

/* 상세 화면 */
.back-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #378ADD; cursor: pointer; padding: 4px 0; background: none; border: none; }
.detail-header { background: #13131f; border: 1px solid #1e1e2e; border-radius: 14px; padding: 16px; }
.detail-coin-name { font-size: 14px; color: #888; }
.detail-price { font-size: 30px; font-weight: 700; color: #fff; margin-top: 4px; }
.detail-change { font-size: 13px; margin-top: 4px; }

/* 차트 */
.chart-card { background: #13131f; border: 1px solid #1e1e2e; border-radius: 14px; padding: 16px; }
.chart-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.chart-tab { background: #1e1e2e; border: none; border-radius: 8px; padding: 5px 12px; font-size: 11px; color: #666; cursor: pointer; }
.chart-tab.active { background: #185FA5; color: #fff; }
.chart-wrap { position: relative; height: 160px; }

/* 지수 목록 */
.index-section-title { font-size: 13px; font-weight: 500; color: #aaa; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.index-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.index-card { background: #13131f; border: 1px solid #1e1e2e; border-radius: 12px; padding: 12px 14px; cursor: pointer; transition: border-color 0.2s; position: relative; }
.index-card:hover { border-color: #378ADD; }
.index-name-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.index-name { font-size: 11px; color: #666; font-weight: 500; }
.index-info { width: 16px; height: 16px; border-radius: 50%; background: #1e1e2e; color: #555; font-size: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-style: italic; font-weight: 700; }
.index-value { font-size: 18px; font-weight: 700; color: #fff; }
.index-status { font-size: 10px; margin-top: 3px; }

/* 팝업 오버레이 */
.popup-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); display: flex; align-items: flex-end; justify-content: center; z-index: 200; }
.popup-overlay.hidden { display: none; }
.popup-box { background: #13131f; border: 1px solid #1e1e2e; border-radius: 20px 20px 0 0; padding: 24px 20px 48px; width: 100%; max-width: 480px; }
.popup-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.popup-title { font-size: 17px; font-weight: 600; color: #fff; }
.popup-close { background: #1e1e2e; border: none; border-radius: 8px; padding: 6px 12px; color: #aaa; cursor: pointer; font-size: 13px; }
.popup-tag { display: inline-block; background: #185FA522; color: #378ADD; font-size: 10px; padding: 3px 8px; border-radius: 4px; margin-bottom: 10px; }
.popup-desc { font-size: 14px; color: #ccc; line-height: 1.8; }
.popup-example { background: #0a0a0f; border-radius: 10px; padding: 12px 14px; margin-top: 12px; font-size: 12px; color: #888; line-height: 1.6; }

/* AI 채팅 */
.chat-section { background: #13131f; border: 1px solid #1e1e2e; border-radius: 14px; overflow: hidden; }
.chat-header { padding: 12px 16px; border-bottom: 1px solid #1e1e2e; display: flex; justify-content: space-between; align-items: center; }
.chat-header-title { font-size: 13px; font-weight: 500; color: #aaa; }
.news-btn { background: #185FA522; border: 1px solid #185FA5; border-radius: 8px; padding: 5px 10px; font-size: 11px; color: #378ADD; cursor: pointer; }
.chat-messages { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; min-height: 100px; max-height: 280px; overflow-y: auto; }
.chat-bubble { max-width: 85%; padding: 10px 13px; border-radius: 14px; font-size: 13px; line-height: 1.6; }
.chat-ai { background: #1e1e2e; border-radius: 4px 14px 14px 14px; color: #ddd; align-self: flex-start; }
.chat-ai-label { font-size: 10px; color: #378ADD; margin-bottom: 4px; font-weight: 500; }
.chat-user { background: #185FA5; border-radius: 14px 4px 14px 14px; color: #fff; align-self: flex-end; }
.chat-input-area { padding: 10px 12px; border-top: 1px solid #1e1e2e; display: flex; gap: 8px; }
.chat-input { flex: 1; background: #0a0a0f; border: 1px solid #1e1e2e; border-radius: 10px; padding: 8px 12px; font-size: 13px; color: #fff; outline: none; font-family: inherit; resize: none; line-height: 1.4; }
.chat-input:focus { border-color: #185FA5; }
.chat-send { background: #185FA5; border: none; border-radius: 10px; padding: 8px 14px; color: #fff; font-size: 13px; cursor: pointer; white-space: nowrap; }
.chat-send:disabled { background: #1e1e2e; color: #444; cursor: not-allowed; }

/* 빠른 버튼 */
.quick-btns { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 12px 10px; }
.quick-btn { background: #0a0a0f; border: 1px solid #1e1e2e; border-radius: 20px; padding: 6px 12px; font-size: 11px; color: #888; cursor: pointer; transition: all 0.2s; }
.quick-btn:hover, .quick-btn.selected { border-color: #185FA5; color: #378ADD; background: #185FA511; }

/* MBTI */
.mbti-card { background: #EEEDFE22; border: 1px solid #534AB744; border-radius: 14px; padding: 20px; text-align: center; }
.mbti-type { font-size: 22px; font-weight: 600; color: #AFA9EC; margin-bottom: 4px; }
.mbti-name { font-size: 13px; color: #7F77DD; margin-bottom: 10px; }
.mbti-desc { font-size: 13px; color: #ccc; line-height: 1.6; }
.tip-box { background: #EAF3DE22; border: 1px solid #639922; border-radius: 12px; padding: 12px 14px; font-size: 13px; color: #97C459; line-height: 1.6; }
.stat-item { margin-bottom: 10px; }
.stat-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
.stat-label { color: #aaa; }
.stat-val { color: #fff; font-weight: 500; }
.progress-bar { height: 4px; background: #1e1e2e; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; }
.card { background: #13131f; border: 1px solid #1e1e2e; border-radius: 14px; padding: 14px 16px; }
.card-label { font-size: 11px; color: #666; margin-bottom: 6px; }
.empty-state { text-align: center; padding: 40px 20px; color: #444; font-size: 14px; line-height: 1.8; }
.btn-outline { width: 100%; background: transparent; border: 1px solid #1e1e2e; border-radius: 12px; padding: 12px; font-size: 13px; color: #aaa; cursor: pointer; }
.btn-outline:hover { border-color: #378ADD; color: #378ADD; }
.history-item { background: #13131f; border: 1px solid #1e1e2e; border-radius: 12px; padding: 14px 16px; cursor: pointer; margin-bottom: 8px; }
.history-body { margin-top: 10px; border-top: 1px solid #1e1e2e; padding-top: 10px; display: none; font-size: 13px; color: #ddd; line-height: 1.6; }
.history-body.open { display: block; }
.notice-text { font-size: 11px; color: #444; text-align: center; padding: 4px 0; }
.typing { display: flex; gap: 4px; align-items: center; }
.typing span { width: 6px; height: 6px; background: #378ADD; border-radius: 50%; animation: bounce 1s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
.growth-badge { display: inline-block; background: #13131f; border: 1px solid #1e1e2e; border-radius: 20px; padding: 4px 12px; font-size: 11px; color: #666; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">📦 투자 블랙박스</div>
    <div class="header-sub">매수 전, 내 감정과 시장을 함께 확인하세요</div>
  </div>
  <div class="nav">
    <div class="nav-item active" onclick="showTab('blackbox',this)">블랙박스</div>

    <div class="nav-item" onclick="showTab('mbti',this)">내 유형</div>
    <div class="nav-item" onclick="showTab('history',this)">기록</div>
  </div>
  <div class="content">

    <!-- 블랙박스 탭 -->
    <div id="tab-blackbox" class="page active">
      <div class="section-title">코인을 선택하세요</div>
      <div class="coin-list" id="coin-list"></div>
    </div>

    <!-- 코인 상세 -->
    <div id="tab-detail" class="page">
      <button class="back-btn" onclick="goBack()">← 목록으로</button>
      <div class="detail-header">
        <div class="detail-coin-name" id="detail-name"></div>
        <div class="detail-price" id="detail-price">-</div>
        <div class="detail-change" id="detail-change">-</div>
      </div>
      <div class="chart-card">
        <div class="chart-tabs">
          <button class="chart-tab active" onclick="changeChartPeriod('days',this)">일</button>
          <button class="chart-tab" onclick="changeChartPeriod('hours',this)">시간</button>
          <button class="chart-tab" onclick="changeChartPeriod('minutes',this)">분</button>
        </div>
        <div class="chart-wrap"><canvas id="price-chart"></canvas></div>
      </div>
      <div>
        <div class="index-section-title">📊 주요 지수 <span style="font-size:11px;color:#555;">클릭하면 설명 봐요</span></div>
        <div class="index-grid" id="index-grid"></div>
      </div>
      <!-- 뉴스 섹션 -->
<div class="news-section" id="news-section" style="display:none;">
  <div class="news-header">
    <div class="news-header-title">📰 최신 뉴스 분석</div>
    <button class="news-close-btn" onclick="closeNews()">✕ 닫기</button>
  </div>
  <div class="news-articles" id="news-articles"></div>
  <div class="news-analysis" id="news-analysis"></div>
</div>

<!-- AI 채팅 섹션 -->
<div class="chat-section">
  <div class="chat-header">
    <div class="chat-header-title">🤖 AI 감정 분석</div>
    <button class="news-btn" onclick="toggleNews()">📰 뉴스 분석</button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="quick-btns">
    <button class="quick-btn" onclick="selectQuick(this,'뉴스에서 오른다고 봤어요')">뉴스 봤어요</button>
    <button class="quick-btn" onclick="selectQuick(this,'친구가 샀다고 해서요')">친구 따라서요</button>
    <button class="quick-btn" onclick="selectQuick(this,'그냥 오를 것 같아요')">그냥 살까요</button>
    <button class="quick-btn" onclick="selectQuick(this,'떨어져서 지금이 기회 같아요')">저점 같아요</button>
    <button class="quick-btn" onclick="selectQuick(this,'유튜브에서 추천해서요')">유튜브 봤어요</button>
  </div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="chat-input" rows="2" placeholder="매수 이유를 말해줘요..." onkeydown="handleKey(event)"></textarea>
    <button class="chat-send" id="chat-send" onclick="sendChat()">전송</button>
  </div>
</div>
    </div>

    <!-- 타임머신 탭 -->
    <div id="tab-timemachine" class="page">
      <div class="empty-state">⏳<br><br>타임머신 기능 준비 중이에요.</div>
    </div>

    <!-- 내 유형 탭 -->
    <div id="tab-mbti" class="page">
      <div id="mbti-content"><div class="empty-state">아직 분석 기록이 없어요.<br>블랙박스에서 분석해보세요!</div></div>
    </div>

    <!-- 기록 탭 -->
    <div id="tab-history" class="page">
      <div id="history-content"><div class="empty-state">아직 기록이 없어요.</div></div>
    </div>
  </div>
</div>

<!-- 지수 설명 팝업 -->
<div class="popup-overlay hidden" id="popup-overlay" onclick="closePopup(event)">
  <div class="popup-box">
    <div class="popup-header">
      <div>
        <div class="popup-title" id="popup-title"></div>
        <div class="popup-tag" id="popup-tag"></div>
      </div>
      <button class="popup-close" onclick="closePopupDirect()">닫기</button>
    </div>
    <div class="popup-desc" id="popup-desc"></div>
    <div class="popup-example" id="popup-example"></div>
  </div>
</div>

<script>
const GEMINI_API_KEY = "AQ.Ab8RN6LI29ANNvFo3kjrkhGynct9teyzKnjfHTsxUnZp5DJFYA";
const BACKEND_URL = "https://skyshhackathon-production.up.railway.app";

const INDEX_INFO = {
  "RSI": {
    tag: "기술적 지표",
    desc: "RSI(상대강도지수)는 최근 가격 움직임의 강도를 0~100 사이 숫자로 나타내요. 쉽게 말하면 '이 코인이 얼마나 과열됐는지'를 보여줘요.",

// 시장 데이터
async function loadDetailData(market) {
  try {
    const [ticker, candles, orderbook] = await Promise.all([
      fetch(`${BACKEND_URL}/api/upbit/ticker?markets=${market}`).then(r => r.json()),
      fetch(`${BACKEND_URL}/api/upbit/candles/days?market=${market}&count=14`).then(r => r.json()),
      fetch(`${BACKEND_URL}/api/upbit/orderbook?markets=${market}`).then(r => r.json())
    ]);

    const t = ticker[0];
    const price = t.trade_price;
    const rate = (t.signed_change_rate * 100).toFixed(2);

    document.getElementById('detail-price').textContent = price.toLocaleString() + '원';
    const chEl = document.getElementById('detail-change');
    chEl.textContent = (rate > 0 ? '▲ +' : '▼ ') + rate + '%';
    chEl.className = 'detail-change ' + (rate > 0 ? 'up' : 'down');

    const rsi = calcRSI(candles);
    const avgVol = candles.reduce((s,c) => s + c.candle_acc_trade_volume, 0) / candles.length;
    const volRatio = (candles[0].candle_acc_trade_volume / avgVol).toFixed(1);
    const highs = candles.map(c => c.high_price);
    const lows = candles.map(c => c.low_price);
    const h52 = Math.max(...highs), l52 = Math.min(...lows);
    const pos52 = h52 !== l52 ? ((price - l52) / (h52 - l52) * 100).toFixed(1) : 50;
    const ob = orderbook[0];
    const totalBid = ob.orderbook_units.reduce((s,u) => s + u.bid_size, 0);
    const totalAsk = ob.orderbook_units.reduce((s,u) => s + u.ask_size, 0);
    const bidAskRatio = (totalBid / totalAsk).toFixed(2);
    const pressure = bidAskRatio > 1.2 ? '매수 우세' : bidAskRatio < 0.8 ? '매도 우세' : '균형';
    const fg = calcFG(rsi, parseFloat(rate), parseFloat(volRatio));
    const todayRange = (((t.high_price - t.low_price) / t.low_price) * 100).toFixed(1);

    marketCtx = { price, rate: parseFloat(rate), rsi, volRatio: parseFloat(volRatio), pos52: parseFloat(pos52), pressure, bidAskRatio: parseFloat(bidAskRatio), fg, todayRange: parseFloat(todayRange) };

    renderIndexGrid(rsi, volRatio, pos52, pressure, bidAskRatio, fg, todayRange);
  } catch(e) { console.error(e); }
}

function renderIndexGrid(rsi, volRatio, pos52, pressure, bidAskRatio, fg, todayRange) {
  const ratio = parseFloat(bidAskRatio);
  const indices = [
    {
      key: "RSI",
      value: rsi,
      status: rsi >= 70 ? '⚠️ 과매수' : rsi <= 30 ? '⚠️ 과매도' : '✅ 중립',
      statusClass: rsi >= 70 || rsi <= 30 ? 'warn' : 'up'
    },
    {
      key: "거래량 비율",
      value: volRatio + '배',
      status: volRatio >= 2 ? '🔥 평소보다 많음' : volRatio <= 0.5 ? '😴 한산함' : '📊 보통',
      statusClass: volRatio >= 2 ? 'warn' : 'neutral'
    },
    {
      key: "52주 위치",
      value: pos52 + '%',
      status: pos52 >= 80 ? '📈 고점 근처' : pos52 <= 20 ? '📉 저점 근처' : '📊 중간',
      statusClass: pos52 >= 80 ? 'warn' : pos52 <= 20 ? 'up' : 'neutral'
    },
    {
      key: "매수/매도 압력",
      value: pressure,
      status: ratio > 1.2 ? '🟢 사려는 사람 많음' : ratio < 0.8 ? '🔴 팔려는 사람 많음' : '⚖️ 균형',
      statusClass: ratio > 1.2 ? 'up' : ratio < 0.8 ? 'down' : 'neutral'

    {
      key: "시장 온도",
      value: fg + '/100',
      status: fg >= 75 ? '🔴 극도의 탐욕' : fg >= 55 ? '🟠 탐욕' : fg >= 45 ? '🟡 중립' : fg >= 25 ? '🔵 공포' : '🟣 극도의 공포',
      statusClass: fg >= 55 ? 'warn' : fg <= 25 ? 'down' : 'neutral'

async function loadChart(market, period) {
  let url = '';
  if (period === 'days') url = `${BACKEND_URL}/api/upbit/candles/days?market=${market}&count=30`;
  else if (period === 'hours') url = `${BACKEND_URL}/api/upbit/candles/minutes/60?market=${market}&count=48`;
  else url = `${BACKEND_URL}/api/upbit/candles/minutes/5?market=${market}&count=60`;

  try {
    const data = await fetch(url).then(r => r.json());
    const reversed = [...data].reverse();
    const labels = reversed.map(d => {
      const dt = new Date(d.candle_date_time_kst);
      if (period === 'days') return (dt.getMonth()+1) + '/' + dt.getDate();
      return dt.getHours() + ':' + String(dt.getMinutes()).padStart(2,'0');
    });
    const prices = reversed.map(d => d.trade_price);

    if (chartInstance) chartInstance.destroy();
    const ctx = document.getElementById('price-chart').getContext('2d');
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: prices,
          borderColor: '#378ADD',
          backgroundColor: 'rgba(55,138,221,0.1)',
          borderWidth: 2,
          pointRadius: 0,
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#555', maxTicksLimit: 6, font: { size: 10 } }, grid: { color: '#1e1e2e' } },
          y: { ticks: { color: '#555', font: { size: 10 }, callback: v => (v/1000000).toFixed(1) + 'M' }, grid: { color: '#1e1e2e' } }
        }
      }
    });
  } catch(e) { console.error(e); }
}

// WebSocket 실시간
function startWebSocket(market) {
  closeWebSocket();
  try {
    const ws = new WebSocket('wss://api.upbit.com/websocket/v1');
    ws.onopen = () => {
      ws.send(JSON.stringify([
        { ticket: 'blackbox' },
        { type: 'ticker', codes: [market] }
      ]));
    };
    ws.onmessage = async (e) => {
      const buf = await e.data.arrayBuffer();
      const text = new TextDecoder().decode(buf);
      const data = JSON.parse(text);
      if (data.type === 'ticker') {
      const price = data.trade_price;
      const rate = (data.signed_change_rate * 100).toFixed(2);
  
      // 롤링 애니메이션
      const priceEl = document.getElementById('detail-price');
      const oldPrice = parseInt(priceEl.dataset.raw || price);
      priceEl.dataset.raw = price;
  
      const formatted = price.toLocaleString() + '원';
      const oldFormatted = oldPrice.toLocaleString() + '원';
  
      priceEl.innerHTML = `
        <div class="price-roller">
          <div class="price-roller-inner" id="price-roller-inner">
            <span>${formatted}</span>
            <span>${oldFormatted}</span>
          </div>
        </div>
      `;
  
      // 아래서 위로 올라오는 애니메이션
      const inner = document.getElementById('price-roller-inner');
      inner.style.transform = 'translateY(-1.2em)';
      setTimeout(() => {
        inner.style.transition = 'none';
        inner.style.transform = 'translateY(0)';
        inner.innerHTML = `<span>${formatted}</span><span></span>`;
      }, 400);
  
      // 색상 변화
      priceEl.style.color = price > oldPrice ? '#2ecc71' : price < oldPrice ? '#e74c3c' : '#fff';
      setTimeout(() => { priceEl.style.color = '#fff'; }, 1000);
  
      // 등락률 업데이트
      const chEl = document.getElementById('detail-change');
      chEl.textContent = (rate > 0 ? '▲ +' : '▼ ') + rate + '%';
      chEl.className = 'detail-change ' + (rate > 0 ? 'up' : 'down');
  
      marketCtx.price = price;
      marketCtx.rate = parseFloat(rate);
    }
    };
    ws.onerror = () => {};
    wsConnections['main'] = ws;
  } catch(e) {}
}

function closeWebSocket() {
  Object.values(wsConnections).forEach(ws => { try { ws.close(); } catch(e){} });
  wsConnections = {};
}

async function callGemini(prompt, useHistory) {
  const typingEl = addTyping();
  try {
    const body = {
      input: prompt || document.getElementById('chat-input').value,
      coin: currentCoinName,
      context: marketCtx,
      history: useHistory ? chatHistory.map(h => ({
        role: h.role,
        content: h.parts[0].text
      })) : []
    };
    const res = await fetch(`${BACKEND_URL}/api/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    const text = data.result;
    typingEl.remove();
    const cleaned = text.replace(/\[EMOTION:[^\]]+\]/g, '').trim();
    addAIBubble(cleaned);
    if (useHistory) chatHistory.push({ role: 'model', parts: [{ text }] });
    if (data.emotion) {
      emotions.push(data.emotion);
      analysisHistory.push({
        coin: currentCoinName,
        input: prompt || '',
        emotion: data.emotion,
        time: new Date().toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })
      });
      localStorage.setItem('bh', JSON.stringify(analysisHistory));
      localStorage.setItem('be', JSON.stringify(emotions));
    }
    return text;
  } catch(e) {
    typingEl.remove();
    addAIBubble('잠시 오류가 났어요. 다시 시도해줘요!');
    return null;
  }
}

// 계산
function calcRSI(candles) {
  const closes = candles.map(c => c.trade_price).reverse();
  let gains = 0, losses = 0;
  for (let i = 1; i < closes.length; i++) {
    const d = closes[i] - closes[i-1];
    if (d > 0) gains += d; else losses -= d;
  }
  const p = closes.length - 1;
  const ag = gains/p, al = losses/p;
  if (al === 0) return 100;
  return Math.round(100 - 100/(1 + ag/al));
}

function calcFG(rsi, rate, volRatio) {
  let s = 50;
  if (rsi >= 70) s += 20; else if (rsi >= 60) s += 10;
  else if (rsi <= 30) s -= 20; else if (rsi <= 40) s -= 10;
  if (rate >= 10) s += 15; else if (rate >= 5) s += 8;
  else if (rate <= -10) s -= 15; else if (rate <= -5) s -= 8;
  if (volRatio >= 3) s += 10; else if (volRatio >= 2) s += 5;
  else if (volRatio <= 0.5) s -= 10;
  return Math.max(0, Math.min(100, Math.round(s)));
}

const MBTI_MAP = {
  'FOMO': { type:'🔥 FOMO형', name:'충동의 파도타기', desc:'남들 수익에 민감하게 반응하고 급등 시 즉각 매수 충동을 느끼는 유형이에요.', tip:'매수 전 \'지금 사지 않으면 정말 기회를 놓치는가?\'를 한 번 더 물어보세요.', knowledge:'FOMO(Fear Of Missing Out)는 급등 뉴스를 접했을 때 이성보다 감정이 앞서는 현상이에요.', color:'#e74c3c' },
  '공포': { type:'😱 공황형', name:'공포의 손절왕', desc:'하락 시 패닉셀 충동이 강한 유형이에요.', tip:'하락이 일시적인지 구조적인지 구분하는 연습이 도움이 돼요.', knowledge:'손실 회피 편향(Loss Aversion)은 손실의 고통이 이익의 기쁨보다 2배 크게 느껴지는 심리예요.', color:'#3498db' },
  '탐욕': { type:'🎰 과신형', name:'근거없는 확신러', desc:'\'이번엔 다르다\'는 과도한 확신을 갖는 유형이에요.', tip:'내 판단이 틀릴 수 있다는 가능성을 항상 열어두세요.', knowledge:'과잉확신 편향(Overconfidence Bias)은 자신의 판단 능력을 실제보다 높게 평가하는 심리예요.', color:'#e67e22' },
  '냉정': { type:'🧊 냉정형', name:'이성의 투자자', desc:'감정보다 논리로 판단하는 유형이에요.', tip:'냉정함을 유지하면서도 분석 마비를 조심하세요.', knowledge:'분석 마비(Analysis Paralysis)는 너무 많은 정보로 오히려 결정을 못 내리는 현상이에요.', color:'#2ecc71' }
};

function renderMbti() {
  const c = document.getElementById('mbti-content');
  if (!emotions.length) { c.innerHTML = '<div class="empty-state">아직 분석 기록이 없어요.<br>블랙박스에서 분석해보세요!</div>'; return; }
  const counts = {};
  emotions.forEach(e => counts[e] = (counts[e]||0)+1);
  const top = Object.keys(counts).sort((a,b) => counts[b]-counts[a])[0];
  const m = MBTI_MAP[top];
  const total = emotions.length;
  const growth = total >= 10 ? '고급 단계' : total >= 5 ? '중급 단계' : '초급 단계';
  const stats = Object.entries(counts).sort((a,b) => b[1]-a[1]).map(([e,cnt]) => {
    const pct = Math.round(cnt/total*100);
    return `<div class="stat-item"><div class="stat-row"><span class="stat-label">${MBTI_MAP[e].type}</span><span class="stat-val">${cnt}회 (${pct}%)</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${MBTI_MAP[e].color}"></div></div></div>`;
  }).join('');
  c.innerHTML = `
    <div class="mbti-card"><div class="mbti-type">${m.type}</div><div class="mbti-name">${m.name}</div><div class="mbti-desc">${m.desc}</div></div>
    <div class="tip-box">💡 ${m.tip}</div>
    <div class="card"><div class="card-label">성장 단계</div><div style="font-size:13px;color:#ddd;">${growth}</div><div class="growth-badge" style="margin-top:8px;">총 ${total}회 분석</div></div>
    <div class="card"><div class="card-label" style="margin-bottom:10px;">감정 통계</div>${stats}</div>
    <div class="card"><div class="card-label" style="margin-bottom:6px;">📚 투자 심리 지식</div><div style="font-size:13px;color:#ddd;line-height:1.7;">${m.knowledge}</div></div>
    <button class="btn-outline" onclick="if(confirm('기록을 초기화할까요?')){localStorage.removeItem('bh');localStorage.removeItem('be');analysisHistory=[];emotions=[];renderMbti();}">🗑️ 기록 초기화</button>
  `;
}

function renderHistory() {
  const c = document.getElementById('history-content');
  if (!analysisHistory.length) { c.innerHTML = '<div class="empty-state">아직 기록이 없어요.</div>'; return; }
  const eEmoji = {'FOMO':'🔥','공포':'😱','탐욕':'🎰','냉정':'🧊'};
  const eColor = {'FOMO':'#e74c3c','공포':'#3498db','탐욕':'#e67e22','냉정':'#2ecc71'};
  c.innerHTML = [...analysisHistory].reverse().map((h,i) => `
    <div class="history-item" onclick="document.getElementById('hb-${i}').classList.toggle('open')">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-size:13px;font-weight:500;">${eEmoji[h.emotion]||'🔍'} ${h.coin}</div>
          <div style="font-size:11px;color:#666;margin-top:2px;">${h.time} · <span style="color:${eColor[h.emotion]||'#888'}">${h.emotion}</span></div>
        </div>
        <div style="font-size:11px;color:#555;">▼</div>
      </div>
      <div style="font-size:12px;color:#aaa;margin-top:6px;">${(h.input||'').slice(0,40)}...</div>
      <div class="history-body" id="hb-${i}" style="font-size:13px;color:#ddd;line-height:1.7;">${h.input||''}</div>
    </div>
  `).join('');
}

window.onload = () => { renderCoinList(); };
</script>
